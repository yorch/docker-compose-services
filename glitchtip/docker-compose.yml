x-environment: &default-environment
  - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  - VALKEY_URL=redis://valkey:6379
  - SECRET_KEY=${SECRET_KEY}
  - PORT=${GLITCHTIP_PORT:-8000}
  # - EMAIL_URL=${EMAIL_URL}
  - GLITCHTIP_DOMAIN=${GLITCHTIP_URL}
  - DEFAULT_FROM_EMAIL=${EMAIL_FROM}
  - ENABLE_ADMIN=${ENABLE_ADMIN}
  - ENABLE_OPENAPI=${ENABLE_OPENAPI}
  - EMAIL_HOST_USER=${EMAIL_HOST_USER}
  - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
  - EMAIL_HOST=${EMAIL_HOST}
  - EMAIL_PORT=${EMAIL_PORT}
  - EMAIL_USE_TLS=${EMAIL_USE_TLS}
  - ENABLE_USER_REGISTRATION=${ENABLE_USER_REGISTRATION}
  - ENABLE_ORGANIZATION_CREATION=${ENABLE_ORGANIZATION_CREATION}
  - GLITCHTIP_RETENTION_DAYS=${GLITCHTIP_RETENTION_DAYS}
  - GLITCHTIP_EVENT_RETENTION_DAYS=${GLITCHTIP_EVENT_RETENTION_DAYS}
  - GLITCHTIP_EVENT_HOT_DAYS=${GLITCHTIP_EVENT_HOT_DAYS}
  - GLITCHTIP_TRANSACTION_RETENTION_DAYS=${GLITCHTIP_TRANSACTION_RETENTION_DAYS}
  - GLITCHTIP_LOG_RETENTION_DAYS=${GLITCHTIP_LOG_RETENTION_DAYS}
  - GLITCHTIP_LOG_HOT_DAYS=${GLITCHTIP_LOG_HOT_DAYS}
  - GLITCHTIP_UPTIME_RETENTION_DAYS=${GLITCHTIP_UPTIME_RETENTION_DAYS}
  - GLITCHTIP_FILE_RETENTION_DAYS=${GLITCHTIP_FILE_RETENTION_DAYS}
  - GLITCHTIP_RELEASE_RETENTION_DAYS=${GLITCHTIP_RELEASE_RETENTION_DAYS}
  - GLITCHTIP_ENABLE_DUCKDB=${GLITCHTIP_ENABLE_DUCKDB:-false}
  - GLITCHTIP_COLD_STORAGE_BUCKET=${GLITCHTIP_COLD_STORAGE_BUCKET}
  - GLITCHTIP_COLD_STORAGE_DIR=${GLITCHTIP_COLD_STORAGE_DIR}
  - DUCKDB_MEMORY_LIMIT=${DUCKDB_MEMORY_LIMIT}
  - DUCKDB_TEMP_DIRECTORY=${DUCKDB_TEMP_DIRECTORY}
  - DUCKDB_EXTENSION_DIRECTORY=${DUCKDB_EXTENSION_DIRECTORY:-}
  - GLITCHTIP_COLD_STORAGE_CLEANUP_ENABLED=${GLITCHTIP_COLD_STORAGE_CLEANUP_ENABLED}

x-depends_on: &default-depends_on
  postgres:
    condition: service_healthy
  valkey:
    condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGUSER=${POSTGRES_USER} # Needed?
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  valkey:
    image: valkey/valkey:9-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'valkey-cli', '--raw', 'incr', 'ping']
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    image: glitchtip/glitchtip
    restart: unless-stopped
    depends_on: *default-depends_on
    environment: *default-environment
    volumes:
      - ./data/uploads:/code/uploads

  worker:
    image: glitchtip/glitchtip
    restart: unless-stopped
    depends_on: *default-depends_on
    environment: *default-environment
    volumes:
      - ./data/uploads:/code/uploads
    command: ./bin/run-worker.sh

  migrate:
    image: glitchtip/glitchtip
    depends_on: *default-depends_on
    environment: *default-environment
    command: './manage.py migrate'

  dbbackups:
    # https://github.com/prodrigestivill/docker-postgres-backup-local
    image: prodrigestivill/postgres-backup-local
    depends_on:
      - postgres
    restart: unless-stopped
    # user: postgres:postgres
    volumes:
      - ./data/postgres-backups:/backups
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # - POSTGRES_PASSWORD_FILE=/run/secrets/db_password <-- alternative for POSTGRES_PASSWORD (to use with docker secrets)
      - POSTGRES_EXTRA_OPTS=-Z6 --schema=public --blobs
      - SCHEDULE=${DBBACKUPS_SCHEDULE}
      - BACKUP_KEEP_DAYS=${DBBACKUPS_BACKUP_KEEP_DAYS}
      - BACKUP_KEEP_WEEKS=${DBBACKUPS_BACKUP_KEEP_WEEKS}
      - BACKUP_KEEP_MONTHS=${DBBACKUPS_BACKUP_KEEP_MONTHS}
      - HEALTHCHECK_PORT=${DBBACKUPS_HEALTHCHECK_PORT}
